<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>SAFIA</title>
  <!--
    GitHub Pages serves this file for any unknown path. This script encodes the
    requested path into a query string and redirects to index.html, where a
    matching snippet in <head> decodes it and calls history.replaceState before
    Vue mounts — so Vue Router sees the original URL.
    Technique: https://github.com/rafgraph/spa-github-pages
  -->
  <script>
    (function () {
      var pathSegmentsToKeep = 0; // 0 for user/org site (owner.github.io), 1 for project site (owner.github.io/repo)
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    }());
  </script>
</head>
<body></body>
</html>
